<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://unpkg.com/boxicons@2.0.7/css/boxicons.min.css" rel="stylesheet">
    <style>
        @font-face {
            font-family: myFirstFont;
            src: url('font/ADAM.CG\ PRO.otf');
        }

        body {
            font-family: MyFirstFont;
            padding: 0;
            margin: 0;
            background-color: #000;
        }

        .nav {
            padding: 16px;

        }

        .logo {
            width: 70px;
            position: fixed;
        }

        .background {
            width: 100%;
            position: absolute;
            overflow: hidden;
            height: 100vh;
            overflow: hidden;
        }

        .bubbles {
            position: relative;
            display: flex;
            z-index: 1;
        }

        .bubbles span {
            position: relative;
            width: 15px;
            height: 15px;
            background-color: #4fc3dc;
            margin: 0 14px;
            border-radius: 100%;
            box-shadow: 0 0 0 10px #4fc3dc44,
                0 0 50px #4fc3dc,
                0 0 100px #4fc3dc;
            animation: animate 15s linear infinite;
            animation-duration: calc(225s / var(--i));
        }

        .bubbles span:nth-child(even) {
            background-color: #ff2d75;
            box-shadow: 0 0 0 10px #ff2d7544,
                0 0 50px #ff2d75,
                0 0 100px #ff2d75;
        }

        @keyframes animate {
            0% {
                transform: translateY(100vh) scale(0);
            }

            100% {
                transform: translateY(-10vh) scale(1);
            }
        }

        .socialMedia {
            position: fixed;
            height: 100%;
            right: 0;
            top: 0;
            flex-direction: column;
            justify-content: space-evenly;
            margin: 50px;
            animation: sm 1s;
        }

        .socialMedia a i {
            color: #fff;
            padding: 20px;
            font-size: 60px;
            cursor: pointer;
        }

        @keyframes sm {
            0% {
                opacity: 0;
            }

            100% {
                opacity: 1;
            }
        }

        .textArea {
            overflow: auto;
            text-align: center;
            color: white;
            width: 70%;
            height: 100%;
            margin-top: 7.5%;
            margin-left: 15%;
            background: rgba(0, 0, 0, .7);
            z-index: 1000;
            border: 5px solid rgba(0, 0, 0, 0.118);
            content: '';
            position: absolute;
            inset: 1px;
            /* background-color: #27282c; */
            box-shadow: 0 0 2px #1ef9ff;
            }

        /* width */
        .textArea::-webkit-scrollbar {
            width: 8px;
        }

        /* Track */
        .textArea::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.118);
            border-radius: 20px;

        }

        /* Handle */
        .textArea::-webkit-scrollbar-thumb {
            border-radius: 20px;

            background: white;
        }

        /* Handle on hover */
        .textArea::-webkit-scrollbar-thumb:hover {
            background: #25616e;
        }

        .addToCss {
            padding: 20px;
            font-size: 20px;
        }

        .textArea div p {
            font-size: 20px;
        }

        @media only screen and (max-width:600px) {
            .background {
                width: 100%;
            }

            .socialMedia {
                position: fixed;
                height: 100%;
                right: auto;
                top: auto;
                flex-direction: column;
                left: 0;
                justify-content: space-evenly;
                margin: 0px;
                margin-top: 50px;
                animation: sm 1s;
            }

            .textArea {
                margin-left: auto;
                right: 0;
            }
        }

        .box ul li {
            z-index: -100;
            position: fixed;
            width: 35px;
            height: 35px;
            list-style: none;
            opacity: 0;
            background: radial-gradient(deepskyblue, transparent, transparent);
            bottom: 0;
            left: 2vw;
            animation: animate 15s linear infinite;
        }

        .box ul li:nth-child(2) {
            left: 37vw;
            animation-delay: 2s;
        }

        .box ul li:nth-child(3) {
            left: 25vw;
            animation-delay: 2-4s;
        }

        .box ul li:nth-child(4) {
            left: 60vw;
            animation-delay: 6s;
        }

        .box ul li:nth-child(5) {
            left: 75vw;
            animation-delay: 4s;
        }

        .box ul li:nth-child(6) {
            left: 87vw;
            animation-delay: 2s;
        }


        @keyframes animate {
            0% {
                transform: scale(0);
                opacity: 1;
                bottom: 0;
            }

            100% {
                transform: scale(10);
                opacity: 0;
                bottom: 100vh;
            }
        }
    </style>
</head>

<body>
    <div class="background">
        <div class="nav">
            <img class="logo" src="images/suhaibLogowhite.png" alt="">
        </div>
        <div class="socialMedia" id="sm">
            <a href="#">
                <i class='bx bxl-facebook-circle'></i>
            </a>
            <br>
            <a href="#">
                <i class='bx bxl-instagram-alt'></i>
            </a>
            <br>
            <a href="#">
                <i class='bx bxl-linkedin-square'></i>
            </a>
            <br>
            <a href="#">
                <i class='bx bxl-github'></i>
            </a>
            <br><a href="#">
                <i class='bx bxl-twitter'></i>
            </a>

        </div>
        <div class="textArea">
            <div class="addToCss addtocss ADDTOCSS ">
                <h1>Inner page</h1>
                <p>Text goes here</p>
                <p>Lorem ipsum dolor sit amet, consectetur adipisicing elit. Sit quidem, sapiente molestiae amet ex tempore dicta, incidunt obcaecati eaque, perspiciatis in veniam recusandae necessitatibus officiis officia fugit et explicabo tempora?</p>
            </div>
        </div>
        <div class="box">
            <ul>
                <li></li>
                <li></li>
                <li></li>
                <li></li>
                <li></li>
                <li></li>
                <li></li>
                <li></li>
            </ul>
        </div>
    </div>
</body>

</html>
